# ============================================================
#  admin-users.properties — Bootstrap Admin Accounts
# ============================================================
#
#  List emails here to grant ROLE_ADMIN on application startup.
#  DataInitializer reads this file and creates these users if
#  they don't exist yet, or assigns ROLE_ADMIN if they do.
#
#  Format: admin.emails = email1, email2, email3
#
#  IMPORTANT:
#   - ROLE_ADMIN can ONLY be assigned from this file.
#   - No API endpoint can grant ROLE_ADMIN.
#   - Password for auto-created admins: change it in the
#     admin.default-password property below.
#   - Existing users in this list get ROLE_ADMIN promoted.
#
# ============================================================

# Comma-separated list of admin email addresses
admin.emails=elkorf@educourse.com

# Default password for auto-created admin accounts (min 6 chars)
# Change this before deploying to production!
admin.default-password=Admin@123
