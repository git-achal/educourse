<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f1f3d"/>

  <!-- Open book pages -->
  <path d="M12 20 C12 20 20 18 32 22 C44 18 52 20 52 20 L52 46 C52 46 44 44 32 48 C20 44 12 46 12 46 Z"
        fill="#f59e0b" opacity="0.15"/>

  <!-- Left page -->
  <path d="M13 21 C13 21 21 19 32 23 L32 47 C21 43 13 45 13 45 Z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Right page -->
  <path d="M51 21 C51 21 43 19 32 23 L32 47 C43 43 51 45 51 45 Z"
        fill="#e8edf5" opacity="0.9"/>

  <!-- Book spine / center line -->
  <line x1="32" y1="23" x2="32" y2="47" stroke="#0f1f3d" stroke-width="1.5" opacity="0.4"/>

  <!-- Lines on left page (text lines) -->
  <line x1="17" y1="29" x2="29" y2="27" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="17" y1="33" x2="29" y2="31" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="17" y1="37" x2="27" y2="35.5" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>

  <!-- Lines on right page -->
  <line x1="35" y1="27" x2="47" y2="29" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="35" y1="31" x2="47" y2="33" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="37" y1="35.5" x2="47" y2="37" stroke="#0f1f3d" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>

  <!-- Graduation cap on top -->
  <!-- Cap brim -->
  <polygon points="32,12 46,18 32,24 18,18" fill="#f59e0b"/>
  <!-- Cap top -->
  <rect x="28" y="9" width="8" height="5" rx="1" fill="#f59e0b" opacity="0.85"/>
  <!-- Tassel string -->
  <line x1="46" y1="18" x2="46" y2="25" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="46" cy="26" r="2" fill="#f59e0b"/>
</svg>
