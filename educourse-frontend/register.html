<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCourse – Create Account</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="auth-body">

  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo"><img src="favicon.svg" class="auth-icon" alt="" /> EduCourse</div>
    <p class="auth-sub">Create your free student account</p>

    <div id="err" class="msg error hidden"></div>
    <div id="ok"  class="msg success hidden"></div>

    <div class="field">
      <label>Full Name</label>
      <input id="fullName" type="text" placeholder="e.g. Rajesh Kumar" autofocus />
    </div>
    <div class="field">
      <label>Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password <span style="font-weight:400;color:var(--muted)">(min 6 characters)</span></label>
      <input id="password" type="password" placeholder="Create a password" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input id="confirmPassword" type="password" placeholder="Repeat your password" />
    </div>

    <button id="btn-reg" class="btn btn-primary btn-full">Create Account</button>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById("btn-reg").addEventListener("click", async function() {
      var fullName        = document.getElementById("fullName").value.trim();
      var email           = document.getElementById("email").value.trim().toLowerCase();
      var password        = document.getElementById("password").value;
      var confirmPassword = document.getElementById("confirmPassword").value;
      hideMsg("err"); hideMsg("ok");

      if (!fullName)           return msg("err", "Full name is required.", "error");
      if (!email)              return msg("err", "Email address is required.", "error");
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
                               return msg("err", "Please enter a valid email address.", "error");
      if (!password)           return msg("err", "Password is required.", "error");
      if (password.length < 6) return msg("err", "Password must be at least 6 characters.", "error");
      if (password !== confirmPassword)
                               return msg("err", "Passwords do not match.", "error");

      try {
        await api.post("/api/auth/register", {
          fullName: fullName, email: email,
          password: password, confirmPassword: confirmPassword
        });
        msg("ok", "Account created! Redirecting to sign in\u2026", "success");
        setTimeout(function() { location.href = "login.html"; }, 1600);
      } catch (e) {
        msg("err", e.isNetworkError ? "Cannot reach server. Is the backend running?" : (e.message || "Registration failed."), "error");
      }
    });

    document.getElementById("confirmPassword").addEventListener("keydown", function(e) {
      if (e.key === "Enter") document.getElementById("btn-reg").click();
    });
  </script>
</body>
</html>
