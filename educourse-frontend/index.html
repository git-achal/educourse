<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCourse – All Courses</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <img src="favicon.svg" class="nav-icon" alt="" /> EduCourse
    </div>
    <div class="nav-search">
      <div class="nav-search-inner">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input class="search-input" id="search" placeholder="Search courses, instructors…" />
        </div>
        <select id="cat-select" class="cat-select">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-links">
        <a href="index.html" class="active">Courses</a>
        <a href="favorites.html"      id="link-fav"    style="display:none">Favorites</a>
        <a href="purchased.html"      id="link-learn"  style="display:none">My Learning</a>
        <a href="manage-courses.html" id="link-manage" style="display:none">Manage Courses</a>
        <a href="admin.html"          id="link-admin"  style="display:none">Admin</a>
      </div>
      <span class="nav-user" id="nav-user"></span>
      <a href="login.html" id="btn-login-nav" class="btn btn-ghost btn-sm">Login</a>
      <button id="btn-logout" class="btn btn-ghost btn-sm" style="display:none">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1>All Courses</h1>
        <p id="page-sub">Browse courses &mdash; <a href="login.html">sign in</a> to enroll or save favorites</p>
      </div>
      <span id="result-count" class="result-count"></span>
    </div>
    <div id="err" class="msg hidden"></div>
    <div class="course-grid" id="grid"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/courses.js"></script>
  <script>injectFooter();</script>
</body>
</html>
